<!DOCTYPE html>
<html>
<head>
  <title>Forgive Me 🥺</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffe6e6, #ffccd5);
      font-family: Arial;
      text-align: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      position: relative;
      width: 320px;
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    #yes {
      background: #ff4d6d;
      color: white;
    }

    #no {
      background: #999;
      color: white;
      position: absolute;
    }
  </style>
</head>

<body>

<div class="container">
  <img id="cat" src="sad.png">
  <h1 id="text">Will you forgive me?</h1>

  <button id="yes">Yes ❤️</button>
  <button id="no">No 😡</button>
</div>

<script>
let step = 0;

const text = document.getElementById("text");
const cat = document.getElementById("cat");
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const container = document.querySelector(".container");

// YES button flow
yesBtn.onclick = () => {
  step++;

  if (step === 1) {
    cat.src = "happy.png";
    text.innerHTML = "Okay… thank you ❤️<br><br>Will you come with me?";
  } 
  else if (step === 2) {
    cat.src = "excited.png";
    text.innerHTML = "Let’s go to Patan for some ice cream 🍦";

    yesBtn.style.display = "none";
    noBtn.style.display = "none";

    setTimeout(() => {
      text.innerHTML += "<br><br>Letss Goooooooo😁";
    }, 2000);
  }
};

// move NO button inside box
function moveNoButton() {
  const btnWidth = noBtn.offsetWidth;
  const btnHeight = noBtn.offsetHeight;

  const maxX = container.clientWidth - btnWidth;
  const maxY = container.clientHeight - btnHeight;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// mobile
noBtn.addEventListener("touchstart", (e) => {
  e.preventDefault();
  moveNoButton();
});

// desktop
noBtn.addEventListener("mouseover", moveNoButton);

// block click 😏
noBtn.addEventListener("click", (e) => {
  e.preventDefault();
  alert("No option is not available 😌");
});
</script>

</body>
</html>
